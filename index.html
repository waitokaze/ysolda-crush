<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crush</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
  </head>
  
  <body>
    <div class="foot-container">
      <img id="ysolda-foot" src="ysolda-foot.png" alt="" />

      <p class="bam">BAAAM</p>

      <p class="cracking-sound crick light">Crick</p>
      <p class="cracking-sound crack light">Crac</p>

      <p class="cracking-sound craaak medium">Craaak</p>
      <p class="cracking-sound kriick medium">Kriick</p>

      <p class="cracking-sound kronch hard">KRONCH</p>
      <p class="cracking-sound kraaakkh hard">KRAAAAA~KKH</p>
      <p class="cracking-sound krrrack hard">KRRRR~ACK!</p>
    </div>

    <div class="chluck">
      <p>CHLUU~CK</p>
    </div>

    <section id="foot-lowering"></section>
    <section id="foot-stomp"></section>
    <section id="cracking-bones"></section>
    <section id="crushed"></section>
  </body>
</html>
